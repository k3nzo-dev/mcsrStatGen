<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self';
    connect-src 'self';
  ">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MCSR Ranked Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .login-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .login-brand-icon { font-size: 28px; }
    .login-brand-name { font-size: 18px; font-weight: 700; color: var(--text); }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: inherit;
      background: rgba(107,31,155,0.1);
      color: var(--text);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .form-group input::placeholder {
      color: rgba(229,229,254,0.35);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(134,1,175,0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 13px 0;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover {
      opacity: 0.9;
      box-shadow: 0 4px 16px rgba(134,1,175,0.4);
    }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg { color: var(--accent); font-size: 13px; margin-top: 10px; min-height: 20px; }
    .success-msg { color: #d580f0; font-size: 13px; margin-top: 10px; min-height: 20px; }

    .login-note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-brand-icon">⏱</span>
        <span class="login-brand-name">MCSR Ranked Stats</span>
      </div>

      <h2 style="text-align:center;font-size:20px;margin-bottom:24px;color:var(--text)">Set a New Password</h2>

      <form id="reset-form">
        <div class="form-group">
          <label for="reset-password">New Password</label>
          <input id="reset-password" name="password" type="password" autocomplete="new-password" required
            placeholder="Minimum 8 characters">
        </div>
        <div class="form-group">
          <label for="reset-confirm">Confirm Password</label>
          <input id="reset-confirm" name="confirm" type="password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="submit-btn">Reset Password</button>
        <div class="error-msg" id="reset-error"></div>
        <div class="success-msg" id="reset-success"></div>
      </form>

      <p class="login-note">
        <a href="/login.html" style="color:#d580f0">← Back to Sign In</a>
      </p>
    </div>
  </div>

  <script src="js/reset-password.js"></script>
</body>

</html>
