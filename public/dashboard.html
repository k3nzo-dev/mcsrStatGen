<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data: https://mc-heads.net;
    connect-src 'self' https://api.mcsrranked.com;
  ">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MCSR Ranked Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Animations ──────────────────────────────────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    @keyframes overlayItemIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Nav (matches homepage) ──────────────────────────────────────────────── */
    .db-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease both;
    }
    .db-nav.nav-scrolled {
      background: rgba(255,255,255,0.95);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .db-nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .db-user-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .db-user-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .db-signout-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 7px 16px;
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .db-signout-btn:hover {
      border-color: #dc2626;
      color: #dc2626;
      background: #fff0f0;
    }

    /* ── Dark header strip ───────────────────────────────────────────────────── */
    .db-header {
      position: relative;
      background: #0d1e10;
      padding: 44px 0 36px;
      overflow: hidden;
      color: #fff;
      animation: fadeIn 0.4s ease both;
    }
    .db-header-grid {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg,   transparent 0, transparent 31px, rgba(58,125,68,0.07) 31px, rgba(58,125,68,0.07) 32px),
        repeating-linear-gradient(90deg,  transparent 0, transparent 31px, rgba(58,125,68,0.07) 31px, rgba(58,125,68,0.07) 32px);
      pointer-events: none;
    }
    .db-header-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 120% at 50% 0%, rgba(58,125,68,0.45) 0%, transparent 65%);
      pointer-events: none;
    }
    .db-header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      animation: fadeSlideUp 0.45s ease both;
    }
    .db-header-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .db-header-title {
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }
    .db-plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(58,125,68,0.25);
      color: #7ed895;
      border: 1px solid rgba(126,216,149,0.35);
      border-radius: 100px;
      padding: 7px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .db-plan-badge::before { content: '✦'; font-size: 0.6rem; }

    /* ── Main layout ─────────────────────────────────────────────────────────── */
    .db-main {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 32px 64px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cards ───────────────────────────────────────────────────────────────── */
    .db-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      padding: 32px;
      animation: fadeSlideUp 0.5s ease both;
    }
    .db-card:nth-child(1) { animation-delay: 0.05s; }
    .db-card:nth-child(2) { animation-delay: 0.14s; }
    .db-card:nth-child(3) { animation-delay: 0.23s; }

    .db-card-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .db-card-title-icon {
      width: 30px;
      height: 30px;
      background: var(--green-muted);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* ── Plan banner ─────────────────────────────────────────────────────────── */
    .plan-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .plan-info p {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .plan-info strong { color: var(--text); }

    /* ── Form ────────────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .form-group input[type="text"] {
      width: 100%;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      font-family: var(--font);
      color: var(--text);
      background: #f8f9fb;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .form-group input[type="text"]:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(58,125,68,0.12);
    }

    /* ── Widget card ─────────────────────────────────────────────────────────── */
    .widget-url-box {
      background: #f8f9fb;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: monospace;
      font-size: 0.78rem;
      word-break: break-all;
      color: var(--muted);
      margin: 12px 0 16px;
      min-height: 36px;
    }
    .widget-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-danger {
      background: transparent;
      border: 1.5px solid #dc2626;
      color: #dc2626;
      border-radius: var(--radius-lg);
      padding: 9px 18px;
      font-size: 0.85rem;
      font-family: var(--font);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-danger:hover { background: #fff0f0; }

    /* ── Toast ───────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--text);
      color: #fff;
      padding: 12px 22px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
      z-index: 999;
      box-shadow: var(--shadow-lg);
    }
    .toast.show {
      opacity: 1;
      animation: toastIn 0.25s ease both;
    }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .db-main { padding: 24px 18px 48px; }
      .db-card { padding: 22px 18px; }
      .db-nav-inner { padding: 0 18px; }
      .db-header-content { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- ── Nav ──────────────────────────────────────────────────────────────── -->
  <nav class="db-nav" id="db-nav">
    <div class="db-nav-inner">
      <a href="/" class="brand">
        <span class="brand-icon">⏱</span>
        <span class="brand-name">MCSR Ranked Stats</span>
      </a>
      <div class="db-user-area">
        <span class="db-user-name" id="user-name">…</span>
        <form method="POST" action="/auth/logout" style="margin:0">
          <button type="submit" class="db-signout-btn">Sign Out</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- ── Header strip ─────────────────────────────────────────────────────── -->
  <div class="db-header">
    <div class="db-header-grid"></div>
    <div class="db-header-glow"></div>
    <div class="container db-header-content">
      <div>
        <p class="db-header-label">Overlay Dashboard</p>
        <h1 class="db-header-title">
          Welcome back,&nbsp;<span id="db-welcome-name" class="text-green">…</span>
        </h1>
      </div>
      <div class="db-plan-badge" id="db-plan-badge">Free Plan</div>
    </div>
  </div>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="db-main">

    <!-- Plan card -->
    <div class="db-card">
      <div class="plan-banner">
        <div class="plan-info">
          <div class="db-card-title" style="margin-bottom:6px">
            <span class="db-card-title-icon">✦</span>
            Your Plan
          </div>
          <p>Currently on <strong id="plan-name">Free</strong> — upgrade for unlimited overlays &amp; pro styles.</p>
        </div>
        <button class="btn btn-green" id="upgrade-btn">Upgrade to Pro</button>
      </div>
    </div>

    <!-- Widget card -->
    <div class="db-card">
      <div class="db-card-title">
        <span class="db-card-title-icon">📡</span>
        Your OBS Widget
      </div>
      <div class="form-group" style="display:flex;gap:10px;align-items:flex-end;margin-bottom:0">
        <div style="flex:1">
          <label for="widget-username">MCSR Username</label>
          <input type="text" id="widget-username" placeholder="e.g. MoleyG" maxlength="16" autocomplete="off">
        </div>
        <button class="btn btn-green" id="save-username-btn" style="margin-bottom:1px">Save</button>
      </div>
      <div id="save-username-error" style="color:#dc2626;font-size:0.82rem;min-height:18px;margin-top:6px"></div>

      <p style="font-size:0.8rem;color:var(--muted);margin:18px 0 4px">
        Widget URL — paste into OBS Browser Source (1100&times;350 px, transparent bg):
      </p>
      <div class="widget-url-box" id="widget-url-display">Enter your MCSR username above to generate your URL.</div>

      <div class="widget-actions">
        <button class="btn btn-green" id="copy-widget-url-btn" disabled>Copy URL</button>
        <button class="btn-danger" id="regen-token-btn">Regenerate Token</button>
      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script>
    // ── Nav scroll shadow ────────────────────────────────────────────────────
    window.addEventListener('scroll', () => {
      document.getElementById('db-nav')
        .classList.toggle('nav-scrolled', window.scrollY > 10);
    });

    // ── Toast ────────────────────────────────────────────────────────────────
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // ── API helpers ──────────────────────────────────────────────────────────
    async function apiGet(path) {
      const res = await fetch(path, { headers: { Accept: 'application/json' } });
      if (res.status === 401) { window.location.href = '/login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }
    async function apiPut(path, body) {
      const res = await fetch(path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.status === 401) { window.location.href = '/login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }
    async function apiPost(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.status === 401) { window.location.href = '/login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }

    // ── Widget URL ───────────────────────────────────────────────────────────
    let currentWidgetToken = null;

    function widgetUrl(username, token) {
      if (!username || !token) return '';
      return `${window.location.origin}/widget/${encodeURIComponent(username)}?token=${token}`;
    }

    function updateWidgetUrlDisplay() {
      const username = document.getElementById('widget-username').value.trim();
      const urlDisplay = document.getElementById('widget-url-display');
      const copyBtn   = document.getElementById('copy-widget-url-btn');
      const url = widgetUrl(username, currentWidgetToken);
      if (url) {
        urlDisplay.textContent = url;
        copyBtn.disabled = false;
      } else {
        urlDisplay.textContent = 'Enter your MCSR username above to generate your URL.';
        copyBtn.disabled = true;
      }
    }

    document.getElementById('widget-username').addEventListener('input', updateWidgetUrlDisplay);

    // ── Save MCSR username ───────────────────────────────────────────────────
    document.getElementById('save-username-btn').addEventListener('click', async () => {
      const errEl = document.getElementById('save-username-error');
      errEl.textContent = '';
      const username = document.getElementById('widget-username').value.trim();
      if (!username) { errEl.textContent = 'Please enter a username.'; return; }
      try {
        const data = await apiPut('/api/me/mcsr-username', { mcsr_username: username });
        if (data.error) { errEl.textContent = data.error; return; }
        showToast('Username saved!');
      } catch (err) {
        errEl.textContent = 'Failed: ' + err.message;
      }
    });

    // ── Copy widget URL ──────────────────────────────────────────────────────
    document.getElementById('copy-widget-url-btn').addEventListener('click', () => {
      const url = document.getElementById('widget-url-display').textContent;
      navigator.clipboard.writeText(url).then(() => showToast('URL copied!'));
    });

    // ── Regenerate token ─────────────────────────────────────────────────────
    document.getElementById('regen-token-btn').addEventListener('click', async () => {
      if (!confirm('Regenerate your widget token? This will break any existing OBS Browser Source links.')) return;
      try {
        const data = await apiPost('/api/me/regen-widget-token', {});
        if (data.error) { showToast('Error: ' + data.error); return; }
        currentWidgetToken = data.widget_token;
        updateWidgetUrlDisplay();
        showToast('Token regenerated — update your OBS source.');
      } catch (err) {
        showToast('Failed: ' + err.message);
      }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      try {
        const me = await apiGet('/api/me');
        const displayName = me.display_name || me.username || me.email || 'Speedrunner';
        document.getElementById('user-name').textContent = displayName;
        document.getElementById('db-welcome-name').textContent = displayName;
        const isPro = me.sub_status && me.sub_status !== 'free';
        document.getElementById('plan-name').textContent = isPro ? 'Pro' : 'Free';
        document.getElementById('db-plan-badge').textContent = isPro ? '✦ Pro Plan' : '✦ Free Plan';

        // Populate widget fields
        currentWidgetToken = me.widget_token || null;
        if (me.mcsr_username) {
          document.getElementById('widget-username').value = me.mcsr_username;
        }
        updateWidgetUrlDisplay();
      } catch { return; }
    }

    // ── Upgrade button ───────────────────────────────────────────────────────
    document.getElementById('upgrade-btn').addEventListener('click', () => {
      showToast('Payments coming soon!');
    });

    init();
  </script>
</body>
</html>
