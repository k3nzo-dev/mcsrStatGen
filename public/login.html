<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    connect-src 'self';
  ">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MCSR Ranked Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .login-brand-icon {
      font-size: 28px;
    }

    .login-brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green);
    }

    .submit-btn {
      width: 100%;
      padding: 13px 0;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }

    .submit-btn:hover {
      opacity: 0.88;
    }

    .submit-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }

    .login-note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-brand-icon">⏱</span>
        <span class="login-brand-name">MCSR Ranked Stats</span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="signin">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Sign In -->
      <div class="tab-panel active" id="tab-signin">
        <form id="signin-form">
          <div class="form-group">
            <label for="signin-username">Username</label>
            <input id="signin-username" name="username" type="text" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <input id="signin-password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="submit-btn">Sign In</button>
          <div class="error-msg" id="signin-error"></div>
        </form>
        <p style="margin-top:12px;text-align:center">
          <a href="#" id="forgot-link" style="font-size:13px;color:var(--green)">Forgot Password?</a>
        </p>

        <!-- Inline forgot-password form (hidden by default) -->
        <div id="forgot-section" style="display:none;margin-top:16px">
          <form id="forgot-form">
            <div class="form-group">
              <label for="forgot-email">Email address</label>
              <input id="forgot-email" name="email" type="email" autocomplete="email" required
                placeholder="Enter your account email">
            </div>
            <button type="submit" class="submit-btn" style="background:var(--muted-dark,#555)">Send Reset Link</button>
            <div class="error-msg" id="forgot-msg" style="color:var(--green)"></div>
          </form>
        </div>
      </div>

      <!-- Register -->
      <div class="tab-panel" id="tab-register">
        <form id="register-form">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input id="reg-username" name="username" type="text" autocomplete="username" required
              placeholder="3–20 chars, letters/numbers/_">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input id="reg-email" name="email" type="email" autocomplete="email" required
              placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input id="reg-password" name="password" type="password" autocomplete="new-password" required
              placeholder="Minimum 8 characters">
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm Password</label>
            <input id="reg-confirm" name="confirm" type="password" autocomplete="new-password" required>
          </div>
          <button type="submit" class="submit-btn">Create Account</button>
          <div class="error-msg" id="register-error"></div>
        </form>
      </div>

      <p class="login-note">
        <a href="/" style="color:var(--green)">← Back to stats generator</a>
      </p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>

</html>
