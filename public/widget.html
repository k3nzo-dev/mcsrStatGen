<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data: https://mc-heads.net;
    connect-src 'self' https://api.mcsrranked.com https://mc-heads.net;
  ">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCSR Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=Press+Start+2P&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: inline-block;
    }

    #card-wrapper {
      position: relative;
      display: inline-block;
      transition: opacity 0.4s ease;
      filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.5)) drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
    }

    #card-wrapper.fading {
      opacity: 0;
    }

    #card-wrapper.hidden {
      display: none;
    }

    #error-msg {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #dc2626;
      background: #fff;
      padding: 12px 20px;
      border-radius: 10px;
    }

    /* ── Widget themes ──────────────────────────────────────────────────── */
    .mc-card.theme-light {
      background: #fff;
      color: var(--text);
    }

    .mc-card.theme-dark {
      background: #1a1f2e;
      color: #e2e8f0;
    }
    .theme-dark .mc-skin-panel {
      background: #232a3b;
      border-right-color: #2d3548;
    }
    .theme-dark .mc-name { color: #f1f5f9; }
    .theme-dark .mc-elo { color: #f1f5f9; }
    .theme-dark .mc-elo-unit { color: #94a3b8; }
    .theme-dark .mc-divider { background: #2d3548; }
    .theme-dark .mc-col-label { color: #94a3b8; }
    .theme-dark .mc-cr { color: #94a3b8; }
    .theme-dark .mc-best { color: #e2e8f0; }
    .theme-dark .mc-best span { color: #94a3b8; }
    .theme-dark .mc-footer {
      background: #151a27;
      border-top-color: #2d3548;
      color: #64748b;
    }
    .theme-dark .mc-detail-section { border-top-color: #2d3548; }
    .theme-dark .mc-breakdown-table th { color: #94a3b8; border-bottom-color: #2d3548; }
    .theme-dark .mc-breakdown-table td { color: #e2e8f0; }
    .theme-dark .mc-wr-bar-track { background: #2d3548; }
    .theme-dark .mc-split-item { background: #232a3b; }
    .theme-dark .mc-split-label { color: #94a3b8; }
    .theme-dark .mc-split-time { color: #f1f5f9; }
    .theme-dark .mc-col-divider { background: #2d3548; }

    .mc-card.theme-glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #f1f5f9;
    }
    .theme-glass .mc-skin-panel {
      background: rgba(255, 255, 255, 0.06);
      border-right-color: rgba(255, 255, 255, 0.1);
    }
    .theme-glass .mc-name { color: #fff; }
    .theme-glass .mc-elo { color: #fff; }
    .theme-glass .mc-elo-unit { color: rgba(255,255,255,0.6); }
    .theme-glass .mc-divider { background: rgba(255,255,255,0.1); }
    .theme-glass .mc-col-label { color: rgba(255,255,255,0.5); }
    .theme-glass .mc-cr { color: rgba(255,255,255,0.5); }
    .theme-glass .mc-best { color: #f1f5f9; }
    .theme-glass .mc-best span { color: rgba(255,255,255,0.5); }
    .theme-glass .mc-footer {
      background: rgba(0,0,0,0.15);
      border-top-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }
    .theme-glass .mc-detail-section { border-top-color: rgba(255,255,255,0.1); }
    .theme-glass .mc-breakdown-table th { color: rgba(255,255,255,0.5); border-bottom-color: rgba(255,255,255,0.1); }
    .theme-glass .mc-breakdown-table td { color: #f1f5f9; }
    .theme-glass .mc-wr-bar-track { background: rgba(255,255,255,0.12); }
    .theme-glass .mc-split-item { background: rgba(255,255,255,0.06); }
    .theme-glass .mc-split-label { color: rgba(255,255,255,0.5); }
    .theme-glass .mc-split-time { color: #fff; }
    .theme-glass .mc-col-divider { background: rgba(255,255,255,0.1); }
  </style>
</head>

<body>

  <div id="card-wrapper" class="hidden">
    <div id="card"></div>
  </div>

  <div id="error-msg"></div>

  <script src="/js/data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/matchData.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/widget.js"></script>
</body>

</html>
